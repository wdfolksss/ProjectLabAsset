<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategori Aset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-slate-100">
<div class="flex">
    {% include 'layout/sidebar_admin.html' %}
    
    <div class="flex-1 p-6 lg:p-10">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-5 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Kategori Aset</h1>
                <p class="text-sm text-gray-500 mt-1">
                    {{ kategori|length }} kategori terdaftar
                </p>
            </div>

            <div>
                <button onclick="toggleModal('modalTambah')"
                    class="bg-teal-600 hover:bg-teal-700 duration-300 text-white px-5 py-2.5 rounded-xl shadow-sm text-sm font-semibold flex items-center gap-2 cursor-pointer">
                    <i class="fa-solid fa-plus"></i>
                    Tambah Kategori
                </button>
            </div>
        </div>

        {% if kategori %}
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for k in kategori %}
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 flex flex-col justify-between relative group">
                
                <div class="absolute top-4 right-4 flex gap-2">
                    <a href="/admin/kategori/edit_kategori/{{ k.id_kategori }}" class="text-gray-400 hover:text-blue-600 duration-200 p-1">
                        <i class="fa-solid fa-pen text-xs"></i>
                    </a>
                    <a href="/admin/kategori/hapus/{{ k.id_kategori }}" onclick="return confirm('Yakin ingin menghapus kategori ini?')" class="text-gray-400 hover:text-red-600 duration-200 p-1">
                        <i class="fa-solid fa-trash text-xs"></i>
                    </a>
                </div>

                <div class="mb-5 pr-10">
                    <h3 class="text-lg font-bold text-slate-800 mb-1">{{ k.nama_kategori }}</h3>
                    <p class="text-sm text-gray-500 line-clamp-2 leading-relaxed">{{ k.deskripsi }}</p>
                </div>

                <div>
                    <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 text-xs font-semibold px-3 py-1.5 rounded-lg">
                        <i class="fa-solid fa-chart-simple text-[10px]"></i>
                        {{ k.total_aset }} aset 
                    </span>
                </div>

            </div>
            {% endfor %}
        </div>
        

    </div>
</div>

<div id="modalTambah" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-3xl shadow-xl p-8 w-full max-w-xl mx-4 transform scale-95 transition-transform duration-300">
        
        <div class="flex items-center justify-between mb-6">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Tambah Kategori</h2>
                <p class="text-xs text-gray-500 mt-1">Tambahkan kategori baru untuk aset laboratorium.</p>
            </div>
            <button onclick="toggleModal('modalTambah')" class="text-gray-400 hover:text-gray-600 p-1 text-xl">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <form action="/admin/kategori/tambah_kategori" method="POST">
            <div class="mb-5">
                <label class="block text-sm text-gray-700 font-semibold mb-2">Nama Kategori</label>
                <input type="text" name="nama_kategori" placeholder="Masukkan nama kategori"
                    class="w-full text-sm border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none"
                    required>
            </div>

            <div class="mb-6">
                <label class="block text-sm text-gray-700 font-semibold mb-2">Deskripsi</label>
                <textarea name="deskripsi" rows="4" placeholder="Masukkan deskripsi kategori..."
                    class="w-full text-sm border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-teal-500 outline-none resize-none"
                    required></textarea>
            </div>

            <div class="flex justify-end gap-3">
                <button type="button" onclick="toggleModal('modalTambah')"
                    class="px-5 py-2.5 text-sm rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold cursor-pointer">
                    Batal
                </button>
                <button type="submit" class="px-5 py-2.5 text-sm rounded-xl bg-teal-600 hover:bg-teal-700 text-white font-semibold cursor-pointer">
                    <i class="fa-solid fa-floppy-disk mr-1.5"></i> Simpan
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function toggleModal(modalId) {
        const modal = document.getElementById(modalId);
        if (modal.classList.contains('hidden')) {
            // Munculkan modal
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('.transform').classList.remove('scale-95');
            }, 10);
        } else {
            // Sembunyikan modal
            modal.classList.add('opacity-0');
            modal.querySelector('.transform').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }
    }
</script>

</body>
</html>
