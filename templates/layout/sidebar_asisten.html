<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Asisten</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>
       <!-- SIDEBAR -->
            <aside class="w-64 min-h-screen bg-[#1F456D] text-white flex flex-col">
            <!-- Logo -->
            <div class="px-6 py-7 flex items-center gap-4 border-b border-blue-800">
                <div class="bg-teal-500 w-12 h-12 rounded-xl flex items-center justify-center">
                    <i class="fa-solid fa-flask text-2xl"></i>
                </div>

                <div>
                    <h1 class="text-xl font-bold">LabInventaris</h1>
                </div>
            </div>

            <!-- User -->
            <div class="p-5">
                <div class="bg-[#2B527C] rounded-xl p-4">
                    <div class="flex items-center gap-3">
                        <div class="bg-teal-500 w-10 h-10 rounded-full flex justify-center items-center">
                            <i class="fa-solid fa-user"></i>
                        </div>

                        <div>
                            <h3 class="font-semibold">Asisten</h3>
                            <p class="text-blue-200 text-sm">Asisten Laboratorium</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Menu -->
            <div class="px-5 space-y-3">
            <a href="/asisten/dashboard" class="flex items-center gap-4 py-4 px-5 rounded-xl
                {% if active == 'dashboard' %} bg-teal-600 {% else %} hover:bg-[#2B527C] {% endif %}">
                    <i class="fa-solid fa-gauge-high"></i>
                    Dashboard
                </a>
                
                 <a href="/asisten/aset" class="flex items-center gap-4 py-4 px-5 rounded-xl
                        {% if active == 'aset' %} bg-teal-600 {% else %} hover:bg-[#2B527C] {% endif %}">
                            <i class="fa-solid fa-box"></i>
                            Aset
                        </a>
                
                    <a href="/asisten/laporan" class="flex items-center gap-4 py-4 px-5 rounded-xl
                        {% if active == 'laporan' %} bg-teal-600 {% else %} hover:bg-[#2B527C] {% endif %}">
                            <i class="fa-solid fa-file-invoice"></i>
                            Laporan
                        </a>
                    </div>

            <!-- Logout -->
            <div class="mt-auto px-5 py-6 border-t border-slate-700/30">
                <a href="/logout" class="flex items-center gap-4 py-3 px-5 rounded-xl text-slate-400 hover:text-white hover:bg-[#2B527C]/55 transition duration-200 group">
                    <i class="fa-solid fa-right-from-bracket w-5 text-center text-lg text-slate-400 group-hover:text-white"></i>
                    <span class="font-medium">Logout</span>
                </a>
            </div>
        </aside>
</body>
</html>
